agents:
  - id: "researcher"
    role: "Content Researcher"
    description: "Initiates the content creation process. Gathers structured facts, insights, and develops a compelling outline for the topic. Passes findings to the Writer."
    skills:
      - mailroom_routing
    model_provider: "groq"
  
  - id: "writer"
    role: "Lead Storyteller"
    description: "Receives the outline from the Researcher. Drafts a comprehensive, engaging narrative that flows well and tells a story."
    skills:
      - mailroom_routing
    model_provider: "groq"
  
  - id: "editor"
    role: "LinkedIn Content Architect"
    description: "Receives the draft from the Writer. Refines, formats, and optimizes the content specifically for maximum engagement on LinkedIn (hooks, spacing, CTAs). Outputs the final post."
    skills:
      - file_management
      - mailroom_routing
    model_provider: "groq"
